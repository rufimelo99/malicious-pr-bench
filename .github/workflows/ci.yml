name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # -------------------------------------------------------------------------
  # Unit tests (no network required)
  # -------------------------------------------------------------------------
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests
        run: uv run pytest -m "not network" --cov=benchmark --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # -------------------------------------------------------------------------
  # Schema contract tests (network — HuggingFace public dataset)
  # -------------------------------------------------------------------------
  schema-tests:
    name: Dataset schema tests
    runs-on: ubuntu-latest
    # Only run on pushes to main and on PRs targeting main, not on every branch push
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run schema contract tests
        run: uv run pytest -m network -v
