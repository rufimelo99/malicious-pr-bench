name: Update Leaderboard

on:
  push:
    branches: [main]
    paths:
      - 'docs/logs/**'
      - '.github/workflows/update-leaderboard.yml'

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Generate leaderboard
        run: |
          # Backup original template if it doesn't exist
          if [ ! -f docs/index.html.bak ]; then
            cp docs/index.html docs/index.html.bak
          fi
          python docs/generate_leaderboard.py \
            --logs docs/logs \
            --template docs/index.html.bak \
            --output docs/index.html

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/leaderboard_data.json
          git diff --cached --quiet || git commit -m "chore: update leaderboard"
          git push
