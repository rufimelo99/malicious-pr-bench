services:
  benchmark:
    image: ${DOCKER_IMAGE:-rufimelo/malicious-pr-cwe89:v0.0.0}
    platform: linux/amd64
    environment:
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea/gitea.db
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__security__SECRET_KEY=localdevonlysecretkey
      - GITEA__security__INTERNAL_TOKEN=localdevonlyinternaltoken
      - GITEA__server__ROOT_URL=${GITEA_ROOT_URL:-http://localhost:3001/}
      - GITEA__server__HTTP_PORT=3001
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__log__LEVEL=Warn
      - GITEA__indexer__ISSUE_INDEXER_TYPE=db
      - GITEA__indexer__REPO_INDEXER_ENABLED=false
      - GITEA__api__DEFAULT_PAGING_NUM=50
      - GITEA__repository__DEFAULT_PUSH_CREATE_PRIVATE=false
    ports:
      - "${GITEA_PORT:-3001}:3001"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
